# CI/CD: Build and deploy on git tag push (e.g. git tag v1.2.0 && git push --tags)
#
# Secrets required in GitHub → Settings → Secrets and variables → Actions:
#   AZURE_CREDENTIALS              Service principal JSON (az ad sp create-for-rbac output)
#   ACR_LOGIN_SERVER               e.g. myacr.azurecr.io
#   ACR_USERNAME                   ACR admin username
#   ACR_PASSWORD                   ACR admin password
#   AZURE_RESOURCE_GROUP           e.g. rg-evals-prod
#   AZURE_WEBAPP_NAME              e.g. evals-app

name: Build and Deploy

on:
  push:
    tags:
      - "v*.*.*"

env:
  BACKEND_IMAGE: evals-backend
  FRONTEND_IMAGE: evals-frontend

jobs:
  build-and-push:
    name: Build images and push to ACR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend.prod
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Inject the image tag into the compose file and deploy
      - name: Deploy to App Service (multi-container)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          configuration-file: docker-compose.prod.yml
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}
