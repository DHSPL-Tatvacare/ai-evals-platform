# Alembic configuration for ai-evals-platform.
#
# DB URL is NOT set here on purpose. env.py reads DATABASE_URL from
# app.config.settings (loaded from env / .env), so a single config works
# for local, CI, and prod without per-environment alembic.ini variants.

[alembic]
# Path is relative to this file (backend/alembic.ini).
script_location = alembic

# Migration filenames look like 0001_<slug>.py — sort lexically by revision id.
# %%(rev)s expands to the revision identifier from `alembic revision`.
file_template = %%(rev)s_%%(slug)s

# Treat revision dates in UTC.
timezone = UTC

# Truncate generated revision slugs at 40 chars.
truncate_slug_length = 40

# Run env.py with script-as-module semantics so `from app.models import Base` works.
prepend_sys_path = .

# Required (must be present even if blank) — env.py overrides at runtime.
sqlalchemy.url =


[post_write_hooks]
# Optional formatting hook for autogenerated migrations. Disabled for now;
# enable when we adopt a formatter for backend/.
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME


# Logging — kept minimal; alembic command output is what matters.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
