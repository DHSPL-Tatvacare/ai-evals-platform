name: inside_sales_model
description: |
  Sherlock workbench semantic model for inside-sales call rubric + lead-pipeline analytics.
  Flat leaf facts: fact_evaluation (one row per evaluation detail), agg_evaluation_run (per-run
  rollup), fact_evaluation_review (human review), plus the lead-pipeline facts. No JSON eval tables.

custom_instructions: |
  Inside-sales scores sales calls against a rubric. In fact_evaluation each scored rubric dimension
  is a row with style='dimension', key=the dimension name (e.g. 'Call Opening & Permission'),
  score and max; the overall call score is the row flagged is_main (key='overall_score'). Run-level
  rollups (avg_score, pass_rate) live on agg_evaluation_run. fact_evaluation_review holds human-review
  verdicts, joinable to fact_evaluation on (run_id, target_key, key).
  Use dim_lead for lead identity, fact_lead_activity for calls/activities,
  fact_lead_stage_transition for stage history.
  Dispatch/campaign analytics: agg_workflow_run for per-run KPIs (recipients, positive/reached/
  no_response/failed/in_flight, dispatched, cost), fact_workflow_engagement for per-channel /
  per-connection / funnel detail. To connect a campaign to lead outcomes, inner-join
  fact_workflow_engagement.lead_id = dim_lead.lead_id (lead_id is NULL for non-lead targets).

module_custom_instructions:
  sql_generation: |
    Use agg_evaluation_run for run-level questions; fact_evaluation (style='dimension') for
    per-dimension or per-call rubric analysis; filter is_main=true for the overall call score.
    Lead-pipeline questions: always join through dim_lead.lead_id.
    Never join fact_evaluation to fact_lead_activity directly — they live on different grains.
    Dispatch KPIs (delivery/answer rates, spend per run): agg_workflow_run. Per-channel /
    per-connection / funnel breakdowns: fact_workflow_engagement, filtering bucket_resolved=true
    before counting outcome_bucket. "Of the leads we called, how many advanced": inner-join
    fact_workflow_engagement.lead_id = dim_lead.lead_id. Never count outcome_bucket without the
    bucket_resolved=true filter (unresolved rows are dispatched-but-not-yet-answered).

tables:
  agg_evaluation_run:
    table_kind: aggregate
    base_table:
      database: ai_evals_platform
      schema: analytics
      table: agg_evaluation_run
    physical_primary_key: { columns: [run_id] }
    analytical_grain: { columns: [run_id] }
    description: One row per inside-sales evaluation run, aggregated.
    dimensions:
      - { name: run_id, expr: run_id, data_type: nominal, physical_type: uuid }
      - { name: run_name, expr: run_name, data_type: nominal, physical_type: text }
      - name: eval_type
        expr: eval_type
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [call_quality]
      - name: status
        expr: status
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [pending, running, completed, completed_with_errors, failed, cancelled]
        synonyms: ["state", "run status", "result", "disposition", "outcome"]
    time_dimensions:
      - { name: created_at, expr: created_at, data_type: temporal, physical_type: timestamptz }
      - { name: completed_at, expr: completed_at, data_type: temporal, physical_type: timestamptz }
    facts:
      - { name: thread_count, expr: thread_count, data_type: quantitative, physical_type: integer }
      - { name: pass_count, expr: pass_count, data_type: quantitative, physical_type: integer }
      - { name: fail_count, expr: fail_count, data_type: quantitative, physical_type: integer }
      - { name: critical_count, expr: critical_count, data_type: quantitative, physical_type: integer }
      - name: pass_rate
        expr: pass_rate
        data_type: quantitative
        physical_type: numeric
        pre_aggregated: true
        synonyms: ["pass percentage", "success rate", "pass %"]
      - name: avg_score
        expr: avg_score
        data_type: quantitative
        physical_type: numeric
        pre_aggregated: true
        synonyms: ["average score", "call quality", "quality", "rating"]
      - { name: duration_ms, expr: duration_ms, data_type: quantitative, physical_type: numeric }
    metrics:
      - name: avg_call_score
        expr: "ROUND(AVG(avg_score)::numeric, 2)"
        synonyms: ["average score", "call quality", "quality", "rating"]

  fact_evaluation:
    table_kind: fact
    base_table:
      database: ai_evals_platform
      schema: analytics
      table: fact_evaluation
    physical_primary_key: { columns: [id] }
    analytical_grain: { columns: [id] }
    description: One row per inside-sales evaluation detail (scored rubric dimension or headline).
    dimensions:
      - { name: run_id, expr: run_id, data_type: nominal, physical_type: uuid }
      - { name: target_key, expr: target_key, data_type: nominal, physical_type: text }
      - name: agent
        expr: agent
        data_type: nominal
        physical_type: text
        synonyms: ["rep", "sales rep", "caller"]
      - name: evaluator_name
        expr: evaluator_name
        data_type: nominal
        physical_type: text
        synonyms: ["evaluator", "rubric", "reviewer", "grader"]
      - name: style
        expr: style
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [dimension, rule, comparison]
      - name: key
        expr: key
        data_type: nominal
        physical_type: text
        synonyms: ["dimension", "rubric dimension", "criterion"]
      - { name: is_main, expr: is_main, data_type: nominal, physical_type: boolean }
    time_dimensions:
      - { name: run_completed_at, expr: run_completed_at, data_type: temporal, physical_type: timestamptz }
    facts:
      - { name: score, expr: score, data_type: quantitative, physical_type: numeric, synonyms: [score, rating, quality] }
      - { name: max, expr: max, data_type: quantitative, physical_type: numeric }
    metrics:
      - name: avg_dimension_score
        expr: "ROUND(AVG(score)::numeric, 2)"
        synonyms: ["average score", "call quality", "rating"]
      - name: evaluated_calls
        expr: "COUNT(DISTINCT target_key)"

  fact_evaluation_review:
    table_kind: fact
    base_table:
      database: ai_evals_platform
      schema: analytics
      table: fact_evaluation_review
    physical_primary_key: { columns: [id] }
    analytical_grain: { columns: [id] }
    description: One row per human review item for an inside-sales evaluation.
    dimensions:
      - { name: run_id, expr: run_id, data_type: nominal, physical_type: uuid }
      - { name: target_key, expr: target_key, data_type: nominal, physical_type: text }
      - { name: key, expr: key, data_type: nominal, physical_type: text }
      - name: decision
        expr: decision
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [accept, correct, reject]
    time_dimensions:
      - { name: reviewed_at, expr: reviewed_at, data_type: temporal, physical_type: timestamptz }

  dim_lead:
    table_kind: dimension
    base_table:
      database: ai_evals_platform
      schema: analytics
      table: dim_lead
    physical_primary_key: { columns: [id] }
    analytical_grain: { columns: [lead_id] }
    description: SCD-1 lead dimension; one row per lead with latest stage.
    dimensions:
      - { name: lead_id, expr: lead_id, data_type: nominal, physical_type: text }
      - { name: source, expr: source, data_type: nominal, physical_type: text }
      - { name: source_ref, expr: source_ref, data_type: nominal, physical_type: text }
      - name: latest_stage_observed
        expr: latest_stage_observed
        data_type: nominal
        physical_type: text
        synonyms: [stage, current stage, pipeline stage, funnel stage]
    time_dimensions:
      - { name: lsq_created_on, expr: lsq_created_on, data_type: temporal, physical_type: timestamptz }
      - { name: first_seen_at, expr: first_seen_at, data_type: temporal, physical_type: timestamptz }
      - { name: latest_stage_observed_at, expr: latest_stage_observed_at, data_type: temporal, physical_type: timestamptz }

  fact_lead_stage_transition:
    table_kind: fact
    base_table:
      database: ai_evals_platform
      schema: analytics
      table: fact_lead_stage_transition
    physical_primary_key: { columns: [id] }
    analytical_grain: { columns: [id] }
    description: Append-only lead stage transitions.
    dimensions:
      - { name: lead_id, expr: lead_id, data_type: nominal, physical_type: text }
      - { name: from_stage, expr: from_stage, data_type: nominal, physical_type: text }
      - { name: to_stage, expr: to_stage, data_type: nominal, physical_type: text }
    time_dimensions:
      - { name: detected_at, expr: detected_at, data_type: temporal, physical_type: timestamptz }
      - { name: transition_at, expr: transition_at, data_type: temporal, physical_type: timestamptz }

  fact_lead_activity:
    table_kind: fact
    base_table:
      database: ai_evals_platform
      schema: analytics
      table: fact_lead_activity
    physical_primary_key: { columns: [id] }
    tenant_scoped_unique_key: { columns: [tenant_id, app_id, source_activity_id] }
    analytical_grain: { columns: [source_activity_id] }
    description: "Lead activities (calls, events). Today: 100% calls; activity_type='call'."
    dimensions:
      - { name: lead_id, expr: lead_id, data_type: nominal, physical_type: text }
      - name: activity_type
        expr: activity_type
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [call, email, web, sms, form_submit, custom, revenue]
      - name: activity_subtype
        expr: activity_subtype
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [inbound_call, outbound_call]
      - name: actor_type
        expr: actor_type
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [rep, lead, system]
      - name: actor_label
        expr: actor_label
        data_type: nominal
        physical_type: text
        source_table: fact_lead_activity
      - name: rep_email
        expr: "attributes->>'rep_email'"
        data_type: nominal
        physical_type: text
        source_table: fact_lead_activity
      - name: status
        expr: "attributes->>'status'"
        data_type: nominal
        physical_type: text
        source_table: fact_lead_activity
      - name: phone_number
        expr: "attributes->>'phone_number'"
        data_type: nominal
        physical_type: text
        source_table: fact_lead_activity
      - name: disposition
        expr: "attributes->>'disposition'"
        data_type: nominal
        physical_type: text
        synonyms: [result, outcome, call result, call outcome]
        source_table: fact_lead_activity
      - name: sub_disposition
        expr: "attributes->>'sub_disposition'"
        data_type: nominal
        physical_type: text
        synonyms: [sub outcome, sub result, detailed disposition]
        source_table: fact_lead_activity
    time_dimensions:
      - { name: occurred_at, expr: occurred_at, data_type: temporal, physical_type: timestamptz }
    facts:
      - name: duration_seconds
        expr: "(attributes->>'duration_seconds')::numeric"
        data_type: quantitative
        physical_type: numeric
        source_table: fact_lead_activity

  agg_workflow_run:
    table_kind: aggregate
    base_table:
      database: ai_evals_platform
      schema: analytics
      table: agg_workflow_run
    physical_primary_key: { columns: [run_id] }
    analytical_grain: { columns: [run_id] }
    description: "One row per campaign/workflow run, recipients collapsed to one most-advanced outcome each (no double-count). Use for run-level dispatch KPIs."
    dimensions:
      - { name: run_id, expr: run_id, data_type: nominal, physical_type: uuid }
      - { name: workflow_id, expr: workflow_id, data_type: nominal, physical_type: uuid, synonyms: [campaign] }
      - { name: workflow_name, expr: workflow_name, data_type: nominal, physical_type: text, synonyms: [campaign name] }
      - name: run_status
        expr: run_status
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [completed, running, failed, cancelled]
      - { name: triggered_by, expr: triggered_by, data_type: nominal, physical_type: text }
    time_dimensions:
      - { name: run_started_at, expr: run_started_at, data_type: temporal, physical_type: timestamptz }
      - { name: run_completed_at, expr: run_completed_at, data_type: temporal, physical_type: timestamptz }
    facts:
      - { name: cohort_size_at_entry, expr: cohort_size_at_entry, data_type: quantitative, physical_type: integer }
      - { name: recipients, expr: recipients, data_type: quantitative, physical_type: integer }
      - { name: positive, expr: positive, data_type: quantitative, physical_type: integer }
      - { name: reached, expr: reached, data_type: quantitative, physical_type: integer }
      - { name: no_response, expr: no_response, data_type: quantitative, physical_type: integer }
      - { name: failed, expr: failed, data_type: quantitative, physical_type: integer }
      - { name: in_flight, expr: in_flight, data_type: quantitative, physical_type: integer }
      - { name: dispatched, expr: dispatched, data_type: quantitative, physical_type: integer }
      - { name: cost, expr: cost, data_type: quantitative, physical_type: numeric, synonyms: [spend] }

  fact_workflow_engagement:
    table_kind: fact
    base_table:
      database: ai_evals_platform
      schema: analytics
      table: fact_workflow_engagement
    physical_primary_key: { columns: [id] }
    tenant_scoped_unique_key: { columns: [run_id, recipient_id, capability] }
    analytical_grain: { columns: [id] }
    description: "One row per (run × recipient × capability) dispatch engagement. Flat, zero-JSON. Count outcome buckets only WHERE bucket_resolved = true. lead_id is set only for CRM-lead recipients (NULL otherwise) — inner-join to dim_lead for campaign→lead questions."
    dimensions:
      - { name: run_id, expr: run_id, data_type: nominal, physical_type: uuid }
      - { name: workflow_id, expr: workflow_id, data_type: nominal, physical_type: uuid, synonyms: [campaign] }
      - { name: workflow_name, expr: workflow_name, data_type: nominal, physical_type: text, synonyms: [campaign name] }
      - { name: recipient_id, expr: recipient_id, data_type: nominal, physical_type: text, synonyms: [recipient, target] }
      - { name: lead_id, expr: lead_id, data_type: nominal, physical_type: text, synonyms: [prospect, lead] }
      - name: capability
        expr: capability
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [voice, messaging, webhook]
      - name: channel
        expr: channel
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [voice, whatsapp, webhook]
      - { name: provider, expr: provider, data_type: nominal, physical_type: text, synonyms: [vendor] }
      - { name: connection_label, expr: connection_label, data_type: nominal, physical_type: text, synonyms: [connection, sender] }
      - name: outcome_bucket
        expr: outcome_bucket
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [positive, reached, no_response, failed, in_flight]
        synonyms: [outcome, result]
      - { name: bucket_resolved, expr: bucket_resolved, data_type: nominal, physical_type: boolean }
      - { name: dispatched, expr: dispatched, data_type: nominal, physical_type: boolean }
      - name: run_status
        expr: run_status
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [completed, running, failed, cancelled]
      - { name: triggered_by, expr: triggered_by, data_type: nominal, physical_type: text }
    time_dimensions:
      - { name: run_started_at, expr: run_started_at, data_type: temporal, physical_type: timestamptz }
    facts:
      - { name: dispatch_attempts, expr: dispatch_attempts, data_type: quantitative, physical_type: integer, synonyms: [attempts, sends] }
      - { name: cost, expr: cost, data_type: quantitative, physical_type: numeric, synonyms: [spend] }
      - { name: cost_rows, expr: cost_rows, data_type: quantitative, physical_type: integer }
      - { name: duration_sec, expr: duration_sec, data_type: quantitative, physical_type: numeric, synonyms: [talk time] }
      - { name: talk_count, expr: talk_count, data_type: quantitative, physical_type: integer }

relationships:
  - name: fact_eval_to_agg_run
    left_table: fact_evaluation
    right_table: agg_evaluation_run
    relationship_columns: [{ left_column: run_id, right_column: run_id }]
    join_type: inner
    relationship_type: many_to_one
  - name: stage_transition_to_lead
    left_table: fact_lead_stage_transition
    right_table: dim_lead
    relationship_columns: [{ left_column: lead_id, right_column: lead_id }]
    join_type: inner
    relationship_type: many_to_one
  - name: lead_activity_to_lead
    left_table: fact_lead_activity
    right_table: dim_lead
    relationship_columns: [{ left_column: lead_id, right_column: lead_id }]
    join_type: inner
    relationship_type: many_to_one
  - name: engagement_to_lead
    left_table: fact_workflow_engagement
    right_table: dim_lead
    relationship_columns: [{ left_column: lead_id, right_column: lead_id }]
    join_type: inner
    relationship_type: many_to_one

verified_queries:
  - name: avg_call_score_by_run_this_week
    question: What is the average call quality per run this week?
    sql: |
      SELECT run_name,
             avg_score,
             pass_rate,
             thread_count
      FROM analytics.agg_evaluation_run
      WHERE tenant_id = :tenant_id AND app_id = :app_id
        AND created_at >= date_trunc('week', now())
      ORDER BY created_at DESC;
  - name: weakest_rubric_dimensions
    question: Which rubric dimensions score lowest in the last 30 days?
    sql: |
      SELECT key,
             ROUND(AVG(score)::numeric, 2) AS avg_score,
             COUNT(*) AS scored
      FROM analytics.fact_evaluation
      WHERE tenant_id = :tenant_id AND app_id = :app_id
        AND style = 'dimension'
        AND is_main = false
        AND run_completed_at >= now() - interval '30 days'
      GROUP BY key
      ORDER BY avg_score ASC;
  - name: leads_stuck_over_7_days
    question: Which leads have not moved stage in over 7 days?
    sql: |
      SELECT lead_id,
             latest_stage_observed,
             latest_stage_observed_at
      FROM analytics.dim_lead
      WHERE tenant_id = :tenant_id AND app_id = :app_id
        AND latest_stage_observed_at < now() - interval '7 days'
      ORDER BY latest_stage_observed_at ASC;
  - name: overall_call_score_by_agent
    question: Average overall call score by agent in the last 30 days
    sql: |
      SELECT agent,
             ROUND(AVG(score)::numeric, 2) AS avg_overall,
             COUNT(*) AS calls
      FROM analytics.fact_evaluation
      WHERE tenant_id = :tenant_id AND app_id = :app_id
        AND is_main = true
        AND run_completed_at >= now() - interval '30 days'
      GROUP BY agent
      ORDER BY avg_overall DESC;
