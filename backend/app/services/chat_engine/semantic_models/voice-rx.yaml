name: voice_rx_model
description: |
  Sherlock workbench semantic model for Voice Rx transcription and critique analytics.
  Flat leaf facts only: fact_evaluation (one row per evaluation detail), agg_evaluation_run
  (per-run rollup), fact_evaluation_review (human review). No transactional or JSON tables.

custom_instructions: |
  Voice Rx evaluates uploaded medical consultation audio. fact_evaluation holds one row per
  evaluation detail; voice-rx details are style='comparison' (a discrepancy between the source
  transcript reference_text and the candidate_text the model produced), with the run headline
  flagged is_main. Run-level quality lives on agg_evaluation_run (avg_score, pass_rate).
  fact_evaluation_review holds human-review verdicts, joinable to fact_evaluation on
  (run_id, target_key, key).

module_custom_instructions:
  sql_generation: |
    Use agg_evaluation_run for run-level trend questions.
    Use fact_evaluation for per-recording or per-detail analysis; filter style='comparison'
    for discrepancies and severity='critical' for the worst ones.
    Join fact_evaluation to agg_evaluation_run only on run_id.

tables:
  agg_evaluation_run:
    table_kind: aggregate
    base_table:
      database: ai_evals_platform
      schema: analytics
      table: agg_evaluation_run
    physical_primary_key: { columns: [run_id] }
    analytical_grain: { columns: [run_id] }
    description: One row per Voice Rx evaluation run, aggregated.
    dimensions:
      - { name: run_id, expr: run_id, data_type: nominal, physical_type: uuid }
      - { name: run_name, expr: run_name, data_type: nominal, physical_type: text }
      - name: eval_type
        expr: eval_type
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [custom, full_evaluation, call_quality]
      - name: status
        expr: status
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [pending, running, completed, completed_with_errors, failed, cancelled]
        synonyms: ["state", "run status", "result", "disposition", "outcome"]
    time_dimensions:
      - { name: created_at, expr: created_at, data_type: temporal, physical_type: timestamptz }
      - { name: completed_at, expr: completed_at, data_type: temporal, physical_type: timestamptz }
    facts:
      - { name: thread_count, expr: thread_count, data_type: quantitative, physical_type: integer }
      - { name: pass_count, expr: pass_count, data_type: quantitative, physical_type: integer }
      - { name: fail_count, expr: fail_count, data_type: quantitative, physical_type: integer }
      - { name: rule_fail_count, expr: rule_fail_count, data_type: quantitative, physical_type: integer }
      - { name: critical_count, expr: critical_count, data_type: quantitative, physical_type: integer }
      - name: pass_rate
        expr: pass_rate
        data_type: quantitative
        physical_type: numeric
        pre_aggregated: true
        synonyms: ["pass percentage", "success rate", "pass %"]
      - name: avg_score
        expr: avg_score
        data_type: quantitative
        physical_type: numeric
        pre_aggregated: true
        synonyms: ["average score", "call quality", "quality", "rating"]
      - { name: duration_ms, expr: duration_ms, data_type: quantitative, physical_type: numeric }
    metrics:
      - name: avg_run_score
        expr: "ROUND(AVG(avg_score)::numeric, 2)"
        description: Average stored run-level Voice Rx score.
        synonyms: ["average score", "call quality", "quality", "rating"]
      - name: avg_pass_rate
        expr: "ROUND(AVG(pass_rate)::numeric, 4)"
        description: Average run pass rate as a 0.0-1.0 fraction.

  fact_evaluation:
    table_kind: fact
    base_table:
      database: ai_evals_platform
      schema: analytics
      table: fact_evaluation
    physical_primary_key: { columns: [id] }
    analytical_grain: { columns: [id] }
    description: One row per Voice Rx evaluation detail (comparison discrepancy or headline).
    dimensions:
      - { name: run_id, expr: run_id, data_type: nominal, physical_type: uuid }
      - { name: target_key, expr: target_key, data_type: nominal, physical_type: text }
      - name: target_type
        expr: target_type
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [transcript, chat_thread]
      - name: evaluator_name
        expr: evaluator_name
        data_type: nominal
        physical_type: text
        synonyms: ["evaluator", "reviewer", "grader", "check"]
      - name: style
        expr: style
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [comparison, dimension, rule]
      - name: key
        expr: key
        data_type: nominal
        physical_type: text
        synonyms: ["category", "field", "criterion"]
      - name: severity
        expr: severity
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [minor, moderate, critical]
      - { name: is_main, expr: is_main, data_type: nominal, physical_type: boolean }
    time_dimensions:
      - { name: run_completed_at, expr: run_completed_at, data_type: temporal, physical_type: timestamptz }
    facts:
      - name: score
        expr: score
        data_type: quantitative
        physical_type: numeric
        synonyms: ["call quality", "quality", "score", "rating"]
    metrics:
      - name: avg_headline_score
        expr: "ROUND(AVG(score)::numeric, 2)"
        synonyms: ["average score", "call quality", "quality", "rating"]
      - name: evaluated_recordings
        expr: "COUNT(DISTINCT target_key)"

  fact_evaluation_review:
    table_kind: fact
    base_table:
      database: ai_evals_platform
      schema: analytics
      table: fact_evaluation_review
    physical_primary_key: { columns: [id] }
    analytical_grain: { columns: [id] }
    description: One row per human review item for a Voice Rx evaluation.
    dimensions:
      - { name: run_id, expr: run_id, data_type: nominal, physical_type: uuid }
      - { name: target_key, expr: target_key, data_type: nominal, physical_type: text }
      - { name: key, expr: key, data_type: nominal, physical_type: text }
      - name: decision
        expr: decision
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [accept, correct, reject]
    time_dimensions:
      - { name: reviewed_at, expr: reviewed_at, data_type: temporal, physical_type: timestamptz }

relationships:
  - name: fact_eval_to_agg_run
    left_table: fact_evaluation
    right_table: agg_evaluation_run
    relationship_columns: [{ left_column: run_id, right_column: run_id }]
    join_type: inner
    relationship_type: many_to_one

verified_queries:
  - name: recent_voice_rx_runs
    question: Show recent Voice Rx runs with pass rate and average score
    sql: |
      SELECT run_name,
             created_at,
             pass_rate,
             avg_score,
             thread_count
      FROM analytics.agg_evaluation_run
      WHERE tenant_id = :tenant_id AND app_id = :app_id
      ORDER BY created_at DESC;
  - name: critical_discrepancies_by_category
    question: Which discrepancy categories are most often critical in the last 30 days?
    sql: |
      SELECT key,
             COUNT(*) AS critical_count
      FROM analytics.fact_evaluation
      WHERE tenant_id = :tenant_id AND app_id = :app_id
        AND style = 'comparison'
        AND severity = 'critical'
        AND run_completed_at >= now() - interval '30 days'
      GROUP BY key
      ORDER BY critical_count DESC;
  - name: low_scoring_recordings
    question: Which Voice Rx recordings scored below 0.7 on the headline metric?
    sql: |
      SELECT target_key,
             evaluator_name,
             score
      FROM analytics.fact_evaluation
      WHERE tenant_id = :tenant_id AND app_id = :app_id
        AND is_main = true
        AND score < 0.7
      ORDER BY score ASC;
