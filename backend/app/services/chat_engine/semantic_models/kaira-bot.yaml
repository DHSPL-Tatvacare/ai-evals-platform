name: kaira_bot_model
description: |
  Sherlock workbench semantic model for Kaira-bot chat-thread and adversarial analytics.
  Flat leaf facts only: fact_evaluation (one row per evaluation detail), agg_evaluation_run
  (per-run rollup), fact_evaluation_review (human review). No transactional or JSON tables.

custom_instructions: |
  Kaira-bot evaluates chat threads (correctness/efficiency → style='rule'; intent → style='dimension')
  and adversarial test cases (style='rule'). A rule detail's status is PASS/FAIL/NA; a FAIL is a rule
  violation. The run headline detail is flagged is_main. Run-level rollups (pass_rate, rule_fail_count)
  live on agg_evaluation_run. fact_evaluation_review holds human-review verdicts, joinable to
  fact_evaluation on (run_id, target_key, key).

module_custom_instructions:
  sql_generation: |
    Use agg_evaluation_run for run-level trend questions.
    Use fact_evaluation with style='rule' AND status='FAIL' for rule violations,
    and style='dimension' for scored dimensions like intent accuracy.
    Join fact_evaluation to agg_evaluation_run only on run_id.

tables:
  agg_evaluation_run:
    table_kind: aggregate
    base_table:
      database: ai_evals_platform
      schema: analytics
      table: agg_evaluation_run
    physical_primary_key: { columns: [run_id] }
    analytical_grain: { columns: [run_id] }
    description: One row per Kaira-bot evaluation run, aggregated.
    dimensions:
      - { name: run_id, expr: run_id, data_type: nominal, physical_type: uuid }
      - { name: run_name, expr: run_name, data_type: nominal, physical_type: text }
      - name: eval_type
        expr: eval_type
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [batch_thread, batch_adversarial]
      - name: status
        expr: status
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [pending, running, completed, completed_with_errors, failed, cancelled]
        synonyms: ["state", "run status", "result", "disposition", "outcome"]
    time_dimensions:
      - { name: created_at, expr: created_at, data_type: temporal, physical_type: timestamptz }
      - { name: completed_at, expr: completed_at, data_type: temporal, physical_type: timestamptz }
    facts:
      - { name: thread_count, expr: thread_count, data_type: quantitative, physical_type: integer }
      - { name: pass_count, expr: pass_count, data_type: quantitative, physical_type: integer }
      - { name: fail_count, expr: fail_count, data_type: quantitative, physical_type: integer }
      - { name: rule_fail_count, expr: rule_fail_count, data_type: quantitative, physical_type: integer, synonyms: [rule violations, violations] }
      - { name: critical_count, expr: critical_count, data_type: quantitative, physical_type: integer }
      - name: pass_rate
        expr: pass_rate
        data_type: quantitative
        physical_type: numeric
        pre_aggregated: true
        synonyms: ["pass percentage", "success rate", "pass %"]
      - name: avg_score
        expr: avg_score
        data_type: quantitative
        physical_type: numeric
        pre_aggregated: true
        synonyms: ["average score", "quality", "rating"]
      - { name: duration_ms, expr: duration_ms, data_type: quantitative, physical_type: numeric }
    metrics:
      - name: avg_pass_rate
        expr: "ROUND(AVG(pass_rate)::numeric, 4)"
        description: Average run pass rate as a 0.0-1.0 fraction.

  fact_evaluation:
    table_kind: fact
    base_table:
      database: ai_evals_platform
      schema: analytics
      table: fact_evaluation
    physical_primary_key: { columns: [id] }
    analytical_grain: { columns: [id] }
    description: One row per Kaira-bot evaluation detail (rule check or scored dimension).
    dimensions:
      - { name: run_id, expr: run_id, data_type: nominal, physical_type: uuid }
      - { name: target_key, expr: target_key, data_type: nominal, physical_type: text }
      - name: target_type
        expr: target_type
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [chat_thread, test_case]
      - name: evaluator_name
        expr: evaluator_name
        data_type: nominal
        physical_type: text
        synonyms: ["evaluator", "reviewer", "grader", "check"]
      - name: style
        expr: style
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [rule, dimension, comparison]
      - name: key
        expr: key
        data_type: nominal
        physical_type: text
        synonyms: ["rule", "rule id", "dimension", "criterion"]
      - name: status
        expr: status
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [PASS, FAIL, NA]
        synonyms: ["verdict", "outcome"]
      - { name: is_main, expr: is_main, data_type: nominal, physical_type: boolean }
    time_dimensions:
      - { name: run_completed_at, expr: run_completed_at, data_type: temporal, physical_type: timestamptz }
    facts:
      - { name: score, expr: score, data_type: quantitative, physical_type: numeric, synonyms: [score, accuracy] }
    metrics:
      - name: rule_violations
        expr: "COUNT(*) FILTER (WHERE style = 'rule' AND status = 'FAIL')"
        synonyms: ["violations", "failures"]
      - name: evaluated_targets
        expr: "COUNT(DISTINCT target_key)"

  fact_evaluation_review:
    table_kind: fact
    base_table:
      database: ai_evals_platform
      schema: analytics
      table: fact_evaluation_review
    physical_primary_key: { columns: [id] }
    analytical_grain: { columns: [id] }
    description: One row per human review item for a Kaira-bot evaluation.
    dimensions:
      - { name: run_id, expr: run_id, data_type: nominal, physical_type: uuid }
      - { name: target_key, expr: target_key, data_type: nominal, physical_type: text }
      - { name: key, expr: key, data_type: nominal, physical_type: text }
      - name: decision
        expr: decision
        data_type: nominal
        physical_type: text
        is_enum: true
        sample_values: [accept, correct, reject]
    time_dimensions:
      - { name: reviewed_at, expr: reviewed_at, data_type: temporal, physical_type: timestamptz }

relationships:
  - name: fact_eval_to_agg_run
    left_table: fact_evaluation
    right_table: agg_evaluation_run
    relationship_columns: [{ left_column: run_id, right_column: run_id }]
    join_type: inner
    relationship_type: many_to_one

verified_queries:
  - name: recent_kaira_runs
    question: Show recent Kaira runs with pass rate and rule failures
    sql: |
      SELECT run_name,
             created_at,
             pass_rate,
             thread_count,
             rule_fail_count
      FROM analytics.agg_evaluation_run
      WHERE tenant_id = :tenant_id AND app_id = :app_id
      ORDER BY created_at DESC;
  - name: top_rule_violations
    question: Which rules are violated most often in the last 30 days?
    sql: |
      SELECT key,
             COUNT(*) AS violations
      FROM analytics.fact_evaluation
      WHERE tenant_id = :tenant_id AND app_id = :app_id
        AND style = 'rule'
        AND status = 'FAIL'
        AND run_completed_at >= now() - interval '30 days'
      GROUP BY key
      ORDER BY violations DESC;
  - name: intent_accuracy_recent
    question: What is the average intent accuracy across recent threads?
    sql: |
      SELECT ROUND(AVG(score)::numeric, 3) AS avg_intent_accuracy,
             COUNT(*) AS evaluations
      FROM analytics.fact_evaluation
      WHERE tenant_id = :tenant_id AND app_id = :app_id
        AND style = 'dimension'
        AND key = 'intent_accuracy';
