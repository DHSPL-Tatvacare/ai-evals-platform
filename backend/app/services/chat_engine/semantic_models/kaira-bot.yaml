version: "3.0"

tables:
  agg_evaluation_run:
    context_keys:
      run_name: { description: "Name for the batch or evaluation run" }
  fact_evaluation:
    context_keys:
      difficulty: { description: "Adversarial test difficulty: EASY, MEDIUM, HARD, CRACK, MORIARTY" }
      total_turns: { description: "Number of conversation turns in the adversarial session (integer)" }

dimensions:
  - name: run_name
    table: agg_evaluation_run
    expression: "run_name"
    description: "User-given run name when present"
  - name: eval_type
    table: agg_evaluation_run
    expression: "eval_type"
    description: "Type of evaluation run: batch_adversarial, batch_thread, or custom"
  - name: intent
    table: fact_evaluation
    expression: "intent"
    description: "Primary intent label for the evaluated item. For batch-thread rows this comes from thread intent metadata, falling back to intent-evaluator output."
  - name: route
    table: fact_evaluation
    expression: "route"
    description: "Primary routed or predicted handling path for the evaluated item. Use this for FoodAgent/FoodInsightAgent style routing analysis."
  - name: query_type
    table: fact_evaluation
    expression: "query_type"
    description: "Intent/query mode such as logging or question"
    allowed_values: ["logging", "question"]
  - name: evaluator_type
    table: fact_evaluation
    expression: "evaluator_type"
    description: "Evaluation or scoring mode: adversarial_judge, correctness, intent, efficiency, or custom"
  - name: evaluator_name
    table: fact_evaluation
    expression: "evaluator_name"
    description: "Human-readable evaluator name"
  - name: result_status
    table: fact_evaluation
    expression: "result_status"
    description: "Primary verdict or outcome"
    ordering: ["PASS", "SOFT FAIL", "HARD FAIL", "CRITICAL", "INCOMPLETE", "NOT APPLICABLE"]
  - name: item_type
    table: fact_evaluation
    expression: "item_type"
    description: "Type of evaluated item: adversarial_case, thread, or listing. Filter on this to scope adversarial vs chat queries."
  - name: thread_id
    table: fact_evaluation
    expression: "item_id"
    description: "Thread or adversarial case identifier"
  - name: difficulty
    table: fact_evaluation
    expression: "difficulty"
    description: "Adversarial test difficulty level: EASY, MEDIUM, HARD, CRACK, or MORIARTY (hardest; security-focused adversarial persona). Only populated for item_type='adversarial_case'; NULL for thread/listing rows."
    allowed_values: ["EASY", "MEDIUM", "HARD", "CRACK", "MORIARTY"]
  - name: total_turns
    table: fact_evaluation
    expression: "total_turns"
    description: "Number of turns in the adversarial conversation (integer). Only populated for item_type='adversarial_case'; NULL for thread/listing rows."
  - name: rule
    table: fact_evaluation_criterion
    expression: "criterion_label"
    description: "Rule or criterion label"
  - name: criterion_source
    table: fact_evaluation_criterion
    expression: "criterion_source"
    description: "Source of the criterion: adversarial_rule, rule_catalog, or persona.<persona_id> for persona expectation rules (e.g. persona.moriarty for Moriarty security invariants)."
  - name: persona_id
    table: fact_evaluation_criterion
    expression: "CASE WHEN criterion_source LIKE 'persona.%' THEN split_part(criterion_source, '.', 2) ELSE NULL END"
    description: "Adversarial persona id derived from criterion_source (e.g. 'moriarty'). NULL for prod rules and non-persona criteria. Use this to aggregate pass rates per persona."
  - name: persona_tactic
    table: fact_evaluation
    expression: "context->>'persona_tactics_attempted'"
    description: "JSONB array (as text) of persona tactic ids attempted in this adversarial case. Example: [\"prompt_override\",\"sql_syntax_destructive\"]. Prefer jsonb_array_elements_text for per-tactic breakdowns."
  - name: persona_tactics_landed
    table: fact_evaluation
    expression: "context->>'persona_tactics_landed'"
    description: "JSONB array of persona tactic ids that landed (triggered a rule violation) in this case. Subset of persona_tactic."
