##
## Base semantic model for the evaluation analytics platform.
## Loaded by the SQL agent and deep-merged UNDER each app's semantic_models/<app>.yaml.
## Flat leaf facts only — update when the analytics schema changes.
##
version: "3.0"
description: >
  Evaluation analytics on flat leaf facts. fact_evaluation holds one row per evaluation detail
  (style = dimension | rule | comparison); agg_evaluation_run is the per-run rollup (matview);
  fact_evaluation_review holds human-review verdicts. No JSONB unpacking — everything is flat.

tables:

  agg_evaluation_run:
    alias: rf
    description: >
      Per-run rollup (materialized view). One row per eval run. Use for run trends,
      pass rates over time, and run comparisons.
    primary_key: run_id
    columns:
      run_id: { type: uuid, description: "References evaluation_runs.id" }
      app_id: { type: text }
      eval_type: { type: text, description: "batch_thread, call_quality, batch_adversarial, full_evaluation, custom" }
      status: { type: text, description: "completed, completed_with_errors, cancelled" }
      created_at: { type: timestamptz }
      completed_at: { type: timestamptz }
      duration_ms: { type: numeric }
      run_name: { type: text, nullable: true, role: dimension, description: "User-given run name when present" }
      thread_count: { type: int, description: "Targets (threads/calls/cases) evaluated in the run" }
      pass_count: { type: int, description: "Targets with no failing detail" }
      fail_count: { type: int, description: "Targets with a rule FAIL or a critical comparison" }
      pass_rate: { type: numeric, nullable: true, description: "0.0-1.0 fraction of targets that passed" }
      avg_score: { type: numeric, nullable: true, role: measure, unit: score, pre_aggregated: true, description: "Average headline (is_main) score for the run" }
      rule_fail_count: { type: int, description: "Total rule details with status='FAIL'" }
      critical_count: { type: int, description: "Total comparison details with severity='critical'" }
    access_control:
      tenant_column: tenant_id

  fact_evaluation:
    alias: ef
    description: >
      Flat leaf fact — one row per evaluation detail. style discriminates the atom:
      'dimension' (scored rubric dimension: score/max), 'rule' (status PASS/FAIL/NA),
      'comparison' (reference_text vs candidate_text, severity). The headline detail has is_main=true.
      Filter/group by evaluator_name when a target has multiple evaluators.
    primary_key: id
    columns:
      id: { type: bigint }
      detail_id: { type: bigint }
      run_id: { type: uuid }
      tenant_id: { type: uuid }
      app_id: { type: text }
      eval_type: { type: text }
      run_completed_at: { type: timestamptz, nullable: true }
      target_key: { type: text, description: "Thread id, call id, or adversarial case id" }
      target_type: { type: text, description: "chat_thread, transcript, test_case" }
      agent: { type: text, nullable: true, role: dimension, description: "Agent/rep associated with the target" }
      direction: { type: text, nullable: true, role: dimension, allowed_values: ["inbound", "outbound"] }
      lead_id: { type: uuid, nullable: true, role: dimension, description: "Lead bridge for CRM-backed apps" }
      evaluator_id: { type: uuid, nullable: true }
      evaluator_name: { type: text, nullable: true, description: "Human-readable evaluator name" }
      style: { type: text, description: "dimension | rule | comparison" }
      key: { type: text, nullable: true, description: "Dimension name, rule id, or comparison category" }
      label: { type: text, nullable: true }
      score: { type: numeric, nullable: true, role: measure, unit: score, description: "Dimension score" }
      max: { type: numeric, nullable: true, description: "Dimension max" }
      status: { type: text, nullable: true, description: "PASS, FAIL, NA (rule details)" }
      severity: { type: text, nullable: true, description: "minor, moderate, critical (comparison details)" }
      locator: { type: text, nullable: true, description: "segment:N / api_field:<name>" }
      is_main: { type: boolean, description: "True for the evaluation's headline detail" }
      reference_text: { type: text, nullable: true }
      candidate_text: { type: text, nullable: true }
      explanation: { type: text, nullable: true }
    joins: "ef.run_id = rf.run_id"
    access_control:
      tenant_column: tenant_id

  fact_evaluation_review:
    alias: rev
    description: >
      Human-review verdicts. One row per review item. Joins fact_evaluation on
      (run_id, target_key, key). Use for 'where did reviewers correct the LLM, by dimension'.
    primary_key: id
    columns:
      id: { type: bigint }
      run_id: { type: uuid }
      tenant_id: { type: uuid }
      app_id: { type: text }
      reviewer_user_id: { type: uuid, nullable: true }
      review_status: { type: text, nullable: true }
      overall_decision: { type: text, nullable: true }
      reviewed_at: { type: timestamptz, nullable: true }
      target_key: { type: text }
      target_type: { type: text, nullable: true }
      key: { type: text, description: "== fact_evaluation.key (dimension/rule reviewed)" }
      decision: { type: text, description: "accept, correct, reject" }
      original_value: { type: text, nullable: true }
      reviewed_value: { type: text, nullable: true }
      reason_code: { type: text, nullable: true }
      note: { type: text, nullable: true }
    joins: "rev.run_id = rf.run_id"
    access_control:
      tenant_column: tenant_id

  evaluation_runs:
    alias: e
    description: >
      Original eval run records. Use for fields not in the facts: batch_metadata, config,
      llm_provider, llm_model. For analytics, prefer agg_evaluation_run.
    primary_key: id
    columns:
      id: { type: uuid }
      app_id: { type: text }
      eval_type: { type: text }
      status: { type: text }
      created_at: { type: timestamptz }
      completed_at: { type: timestamptz }
      duration_ms: { type: float }
      llm_provider: { type: text }
      llm_model: { type: text }
      "batch_metadata->>'name'": { type: text, description: "User-given run name" }
    access_control:
      tenant_column: tenant_id
      user_column: user_id
      visibility_column: visibility
      app_column: app_id

dimensions:
  - name: run_id
    table: agg_evaluation_run
    expression: "run_id::text"
    description: "Canonical evaluation run identifier"
  - name: run_name
    table: agg_evaluation_run
    expression: "run_name"
    description: "User-given run name"
  - name: eval_type
    table: agg_evaluation_run
    expression: "eval_type"
    description: "Type of run or evaluation"
  - name: run_status
    table: agg_evaluation_run
    expression: "status"
    description: "Lifecycle status of the evaluation run"
  - name: evaluator_name
    table: fact_evaluation
    expression: "evaluator_name"
    description: "Human-readable evaluator name"
  - name: style
    table: fact_evaluation
    expression: "style"
    description: "Detail kind: dimension, rule, or comparison"
  - name: key
    table: fact_evaluation
    expression: "key"
    description: "Dimension name, rule id, or comparison category"
  - name: target_key
    table: fact_evaluation
    expression: "target_key"
    description: "Canonical evaluated target identifier"
  - name: target_type
    table: fact_evaluation
    expression: "target_type"
    description: "Kind of evaluated target"
  - name: severity
    table: fact_evaluation
    expression: "severity"
    description: "Comparison severity (minor/moderate/critical)"

metrics:
  pass_rate:
    description: "Fraction of targets that passed (from run facts)"
    sql: "rf.pass_rate"
    applies_to: agg_evaluation_run

  avg_score:
    description: "Average headline score across runs"
    sql: "ROUND(AVG(rf.avg_score)::numeric, 2)"
    applies_to: agg_evaluation_run

  rule_violation_count:
    description: "Count of rule details that FAILed"
    sql: "COUNT(*) FILTER (WHERE ef.style = 'rule' AND ef.status = 'FAIL')"
    applies_to: fact_evaluation

common_queries:
  - intent: "Which rules are most violated?"
    sql: |
      SELECT ef.key AS rule_id,
             ef.label AS section,
             COUNT(*) FILTER (WHERE ef.status = 'FAIL') AS violated,
             COUNT(*) FILTER (WHERE ef.status = 'PASS') AS followed
      FROM fact_evaluation ef
      WHERE ef.app_id = :app_id AND ef.tenant_id = :tenant_id
        AND ef.style = 'rule'
      GROUP BY ef.key, ef.label
      ORDER BY violated DESC

  - intent: "Pass rate trend over time"
    sql: |
      SELECT rf.run_id::text,
             rf.run_name AS run_name,
             rf.created_at::date AS date,
             rf.thread_count AS threads,
             rf.pass_rate
      FROM agg_evaluation_run rf
      WHERE rf.app_id = :app_id AND rf.tenant_id = :tenant_id
        AND rf.status IN ('completed', 'completed_with_errors')
      ORDER BY rf.created_at DESC

  - intent: "Weakest rubric dimensions"
    sql: |
      SELECT ef.key AS dimension,
             ROUND(AVG(ef.score)::numeric, 2) AS avg_score,
             COUNT(*) AS scored
      FROM fact_evaluation ef
      WHERE ef.app_id = :app_id AND ef.tenant_id = :tenant_id
        AND ef.style = 'dimension' AND ef.is_main = false
      GROUP BY ef.key
      ORDER BY avg_score ASC

  - intent: "Where did reviewers correct the LLM, by dimension?"
    sql: |
      SELECT rev.key AS dimension,
             COUNT(*) FILTER (WHERE rev.decision = 'correct') AS corrections,
             COUNT(*) AS reviewed
      FROM fact_evaluation_review rev
      WHERE rev.app_id = :app_id AND rev.tenant_id = :tenant_id
      GROUP BY rev.key
      ORDER BY corrections DESC
