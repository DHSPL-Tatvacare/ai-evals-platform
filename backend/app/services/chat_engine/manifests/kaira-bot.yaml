# backend/app/services/chat_engine/manifests/kaira-bot.yaml
app_id: kaira-bot
description: |
  Kaira-bot analytics — chat-thread correctness/efficiency/intent and adversarial evaluations.
  Flat leaf facts: fact_evaluation (one row per evaluation detail), agg_evaluation_run (per-run rollup),
  fact_evaluation_review (human review). No JSON columns; raw evidence stays in the TXN spine.

catalog_tables:
  agg_evaluation_run:
    pg_schema: analytics
    expected_empty_when: "no evaluation runs have been scored for this app yet (fresh DB / freshly-onboarded app)"
    layer: analytics_aggregate
    grain: run
    orm: AggEvaluationRun
    alias: rf
    columns:
      run_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
        synonyms: ["run", "run id", "evaluation run"]
      tenant_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      user_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
        nullable: true
      app_id:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["voice-rx", "kaira-bot", "inside-sales"]
      eval_type:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["batch_thread", "call_quality", "batch_adversarial", "custom", "full_evaluation"]
        synonyms: ["evaluation type", "run type", "test type"]
      status:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["pending", "running", "completed", "completed_with_errors", "failed", "cancelled"]
      created_at:
        role: temporal
        type: timestamptz
        data_type: temporal
      completed_at:
        role: temporal
        type: timestamptz
        data_type: temporal
        nullable: true
      duration_ms:
        role: measure
        type: float
        data_type: quantitative
        semantic_type: duration
        unit: ms
        measure_kind: duration_ms
        nullable: true
      run_name:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
        description: "User-given run name when present"
      thread_count:
        role: measure
        type: int
        data_type: quantitative
        semantic_type: count
        measure_kind: count
        nullable: true
        synonyms: ["targets", "items evaluated"]
      pass_count:
        role: measure
        type: int
        data_type: quantitative
        semantic_type: count
        measure_kind: count
        nullable: true
      fail_count:
        role: measure
        type: int
        data_type: quantitative
        semantic_type: count
        measure_kind: count
        nullable: true
      pass_rate:
        role: measure
        type: float
        data_type: quantitative
        semantic_type: ratio
        measure_kind: ratio
        nullable: true
        description: "0.0-1.0 fraction of targets with no failing detail"
      avg_score:
        role: measure
        type: float
        data_type: quantitative
        semantic_type: score
        nullable: true
        measure_kind: score
      rule_fail_count:
        role: measure
        type: int
        data_type: quantitative
        semantic_type: count
        measure_kind: count
        nullable: true
      critical_count:
        role: measure
        type: int
        data_type: quantitative
        semantic_type: count
        measure_kind: count
        nullable: true
  fact_evaluation:
    pg_schema: analytics
    expected_empty_when: "no evaluation runs have been scored for this app yet (fresh DB / freshly-onboarded app)"
    layer: analytics_fact
    grain: evaluation_detail
    orm: FactEvaluation
    alias: ef
    columns:
      id:
        role: identifier
        type: bigint
        data_type: nominal
        semantic_type: pk
      detail_id:
        role: identifier
        type: bigint
        data_type: nominal
        semantic_type: id_hash
      run_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      tenant_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      app_id:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      eval_type:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      run_completed_at:
        role: temporal
        type: timestamptz
        data_type: temporal
        nullable: true
      target_key:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
        synonyms: ["recording", "call id", "thread id", "case id"]
      target_type:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["chat_thread", "transcript", "test_case"]
      agent:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
      direction:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
      evaluator_name:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
        synonyms: ["evaluator", "reviewer", "grader", "check"]
      style:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["dimension", "rule", "comparison"]
      key:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
        synonyms: ["dimension", "criterion", "rule", "category"]
      label:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
      score:
        role: measure
        type: float
        data_type: quantitative
        semantic_type: score
        nullable: true
        measure_kind: score
      max:
        role: measure
        type: float
        data_type: quantitative
        semantic_type: score
        nullable: true
        measure_kind: score
      status:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
        allowed_values: ["PASS", "FAIL", "NA"]
        synonyms: ["verdict", "outcome"]
      severity:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
        allowed_values: ["minor", "moderate", "critical"]
      is_main:
        role: dimension
        type: boolean
        data_type: boolean
        nullable: true
        description: "True for the headline detail of the evaluation"
  fact_evaluation_review:
    pg_schema: analytics
    expected_empty_when: "no human reviews have been recorded for this app yet"
    layer: analytics_fact
    grain: review_item
    orm: FactEvaluationReview
    alias: rev
    columns:
      id:
        role: identifier
        type: bigint
        data_type: nominal
        semantic_type: pk
      run_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      tenant_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      app_id:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      reviewer_user_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
        nullable: true
      review_status:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
      overall_decision:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
      reviewed_at:
        role: temporal
        type: timestamptz
        data_type: temporal
        nullable: true
      target_key:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
      key:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        synonyms: ["dimension", "attribute", "field"]
      decision:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
        allowed_values: ["accept", "correct", "reject"]
