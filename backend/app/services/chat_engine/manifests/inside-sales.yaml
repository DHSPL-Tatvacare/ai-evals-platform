# Every lead-grain fact joins back to dim_lead via lead_id. The boot
# validator's cardinality audit confirms each relation is truly many-to-one
# (every fact row has exactly one matching dim_lead row; orphans fail boot).
relationships:
  - left_table: fact_lead_activity
    left_column: lead_id
    right_table: dim_lead
    right_column: lead_id
    relationship_type: many_to_one
  - left_table: fact_lead_signal
    left_column: lead_id
    right_table: dim_lead
    right_column: lead_id
    relationship_type: many_to_one
  - left_table: fact_lead_stage_transition
    left_column: lead_id
    right_table: dim_lead
    right_column: lead_id
    relationship_type: many_to_one
