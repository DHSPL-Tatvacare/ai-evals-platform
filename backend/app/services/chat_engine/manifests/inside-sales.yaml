        data_type: nominal
        semantic_type: fk
        nullable: true
      listing_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: fk
        nullable: true
      session_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: fk
        nullable: true
      llm_provider:
        role: dimension
        type: text
