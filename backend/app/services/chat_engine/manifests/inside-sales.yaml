  evaluators:
    orm: Evaluator
    pg_schema: platform
    layer: identity
    grain: evaluator
    alias: e
    columns:
      id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: pk
      tenant_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      user_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      app_id:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      name:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      created_at:
        role: temporal
        type: timestamptz
        data_type: temporal
      visibility:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
  # CRM mirror tables (`crm_call_record`, `crm_lead_record`) are hidden
  # from this Sherlock-visible catalog by design. The mirrors still exist
  # physically and back the sync pipeline + CRM workspace pages, but
  # Sherlock generates SQL only against the fact + dim surface below.
  # The supervisor prompt's hidden-mirror recovery rule translates user
  # mentions of `crm_call_record` → `fact_lead_activity` and
  # `crm_lead_record` → `dim_lead`, and acknowledges the swap in its
  # answer so the user can correct future prompts.
  dim_lead:
    pg_schema: analytics
    expected_empty_when: "no leads have been synced for this app yet (fresh DB / freshly-onboarded app)"
    layer: identity
    grain: lead
    orm: DimLead
    alias: dl
    columns:
      id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: pk
      tenant_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      app_id:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["inside-sales"]
      lead_id:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
        synonyms: ["prospect", "prospect id", "lead", "contact"]
      source:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      source_ref:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
      lsq_created_on:
        role: temporal
        type: timestamptz
        data_type: temporal
        nullable: true
        synonyms: ["lead created", "created on (LSQ)"]
      first_seen_at:
        role: temporal
        type: timestamptz
        data_type: temporal
      latest_stage_observed:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
        synonyms: ["current stage", "latest stage"]
        description: "Current CRM stage for the lead."
      latest_stage_observed_at:
        role: temporal
        type: timestamptz
        data_type: temporal
        nullable: true
      assigned_rep_label:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
        synonyms: ["owner", "lead owner", "assigned rep", "agent"]
        description: "Assigned lead owner in the CRM. May differ from the agent on any individual call."
      first_name:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
        pii: true
        description: "Lead's first name. PII — masked unless the caller's role is allow-listed in crmWorkspace.piiVisibility."
      last_name:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
        pii: true
        description: "Lead's last name. PII — masked unless the caller's role is allow-listed in crmWorkspace.piiVisibility."
      phone:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
        pii: true
        description: "Lead's phone number. PII — masked unless the caller's role is allow-listed in crmWorkspace.piiVisibility."
      email:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
        pii: true
        description: "Lead's email address. PII — masked unless the caller's role is allow-listed in crmWorkspace.piiVisibility."
      city:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
        pii: true
        description: "Lead's city. PII — masked unless the caller's role is allow-listed in crmWorkspace.piiVisibility."
      attributes_at_first_seen:
        role: dimension
        type: jsonb
        data_type: nominal
        description: "Frozen snapshot of the normalized lead-profile fields captured at first sync (age_group, condition, hba1c_band, intent_to_pay, source, source_campaign). The inputs the seeded `mql` rule scores on."
      attributes:
        role: dimension
        type: jsonb
        data_type: nominal
        description: "Mutable current-state bag for the lead (e.g. plan_name once converted). Schema in attribute_schemas._default."
      created_at:
        role: temporal
        type: timestamptz
        data_type: temporal
      updated_at:
        role: temporal
        type: timestamptz
        data_type: temporal
    # dim_lead has no discriminator column — its `attributes` JSONB carries
    # the mutable current-state bag under the single `_default` bucket.
    # (`attributes_at_first_seen` is the frozen snapshot and is modelled as
    # a plain column; its keys are a stable normalized vocabulary, not a
    # per-row-typed bag, so they are not declared here.)
    attribute_schemas:
      _default:
        plan_name:
          data_type: nominal
          semantic_type: category
          description: "Care plan purchased by the lead. Populated for converted / payment-received leads."
  fact_lead_stage_transition:
    pg_schema: analytics
    expected_empty_when: "no leads have been synced for this app yet (fresh DB / freshly-onboarded app)"
    layer: analytics_fact
    grain: stage_transition
    orm: FactLeadStageTransition
    alias: lst
    columns:
      id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: pk
      tenant_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      app_id:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      lead_id:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
        synonyms: ["prospect", "prospect id", "lead", "contact"]
      from_stage:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
      to_stage:
        role: dimension
        type: text
        data_type: nominal
        synonyms: ["current stage", "new stage"]
      detected_at:
        role: temporal
        type: timestamptz
        data_type: temporal
        description: "observation time; real transition happened at or before this timestamp, bounded by the prior detection."
      transition_at:
        role: temporal
        type: timestamptz
        data_type: temporal
        nullable: true
        description: "reserved for future webhook-derived rows; always NULL in v1."
      sync_run_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
        nullable: true
      attributes:
        role: dimension
        type: jsonb
        data_type: nominal
      created_at:
        role: temporal
        type: timestamptz
        data_type: temporal
    # Stage transitions carry no per-to_stage payload today; `_default`
    # reserves the attribute_schemas surface for future per-to_stage
    # transition payloads (e.g. churn_reason on the Lost stage).
    attribute_schemas:
      _default: {}
  fact_lead_activity:
    pg_schema: analytics
    expected_empty_when: "no calls/activities have been synced for this app yet (fresh DB / freshly-onboarded app)"
    layer: analytics_fact
    grain: lead_activity
    orm: FactLeadActivity
    alias: la
    columns:
      id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: pk
      tenant_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      app_id:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      lead_id:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
        synonyms: ["prospect", "prospect id", "lead", "contact"]
        description: "CRM lead identifier linked to the call."
      source_activity_id:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
        synonyms: ["LSQ activity id", "activity id"]
        description: "CRM activity identifier for the call."
      activity_type:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["call", "email", "web", "sms", "form_submit", "custom", "revenue"]
      activity_subtype:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
        allowed_values: ["inbound_call", "outbound_call"]
      source_event_code:
        role: dimension
        type: int
        data_type: nominal
        nullable: true
        description: "raw LSQ ActivityEvent numeric code"
      occurred_at:
        role: temporal
        type: timestamptz
        data_type: temporal
        synonyms: ["activity time", "happened at"]
        description: "Start time of the synced call activity."
      actor_type:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
        # Phase 1 (Alembic 0038) canonicalized human-actor type to ``rep``;
        # ``agent`` retained for legacy rows during the soak.
        allowed_values: ["rep", "agent", "lead", "system"]
      actor_id:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
        nullable: true
        synonyms: ["agent", "agent id", "salesperson", "rep", "caller"]
      actor_label:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
        synonyms: ["agent", "agent id", "agent name", "rep", "rep name", "salesperson", "caller"]
        description: "Sales rep who handled this call."
      attributes:
        role: dimension
        type: jsonb
        data_type: nominal
      sync_run_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
        nullable: true
      created_at:
        role: temporal
        type: timestamptz
        data_type: temporal
    attribute_schemas:
      call:
        duration_seconds:
          data_type: quantitative
          semantic_type: duration
          unit: seconds
          description: "Call duration in seconds; mirrors the typed mirror column."
        direction:
          data_type: nominal
          semantic_type: category
          allowed_values: ["inbound", "outbound"]
          description: "Inbound or outbound call direction."
        status:
          data_type: nominal
          semantic_type: category
          allowed_values: ["answered", "no_answer", "busy", "rejected", "voicemail"]
          description: "Answered calls connected successfully; other statuses did not connect."
        phone_number:
          data_type: nominal
          semantic_type: id_hash
          pii: true
        recording_url:
          data_type: nominal
          semantic_type: none
        rep_email:
          data_type: nominal
          semantic_type: id_hash
          synonyms: ["rep email", "sales rep email"]
        has_recording:
          data_type: boolean
          semantic_type: category
        call_notes:
          data_type: nominal
          semantic_type: none
          pii: true
        event_code:
          data_type: nominal
          semantic_type: category
          description: "Raw LSQ ActivityEvent code; also surfaced structurally as source_event_code."
        call_session_id:
          data_type: nominal
          semantic_type: id_hash
        display_number:
          data_type: nominal
          semantic_type: id_hash
          pii: true
