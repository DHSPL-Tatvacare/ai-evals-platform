        data_type: nominal
        nullable: true
        synonyms: ["connection", "sender", "line"]
      outcome_bucket:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["positive", "reached", "no_response", "failed", "in_flight"]
        synonyms: ["outcome", "engagement outcome", "result"]
        description: "Most-advanced engagement outcome for this recipient on this capability. Count buckets only where bucket_resolved is true."
      bucket_resolved:
        role: dimension
        type: boolean
        data_type: nominal
        semantic_type: category
        description: "True when a real outcome was observed; false for dispatched-but-unresolved (pure-dispatch) recipients. Filter to true before counting outcome_bucket."
      dispatched:
        role: dimension
        type: boolean
        data_type: nominal
        semantic_type: category
      dispatch_attempts:
        role: measure
        type: int
        data_type: quantitative
        semantic_type: count
