      created_at:
        role: temporal
        type: timestamptz
        data_type: temporal
    # No declared JSONB keys today: the LLM-extracted signal payload is
    # carried structurally on signal_value / signal_value_numeric /
    # confidence / supporting_quote columns. `_default` reserves the
    # attribute_schemas surface for future signal_type-specific keys.
    attribute_schemas:
      _default: {}
  # Dispatch/campaign analytics (orchestration leg). Flat, zero-JSON. The leaf fact is
  # (run × recipient × capability); agg_workflow_run is its recipient-collapsed per-run rollup.
  # lead_id bridges to dim_lead ONLY for lead-sourced recipients (NULL for dataset/event/webhook
  # targets), so campaign→lead questions INNER-join on lead_id — it is NOT a full FK, hence not in
  # the orphan-guarded relationships block below.
  fact_workflow_engagement:
    pg_schema: analytics
    expected_empty_when: "no workflow/campaign runs have dispatched for this app yet (fresh DB / freshly-onboarded app)"
    layer: analytics_fact
    grain: engagement
    orm: FactWorkflowEngagement
    alias: fwe
    columns:
      id:
        role: identifier
        type: int
        data_type: nominal
        semantic_type: pk
      tenant_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      app_id:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["inside-sales"]
      workflow_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
        synonyms: ["campaign", "campaign id", "workflow"]
      workflow_name:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
        synonyms: ["campaign name", "workflow name"]
      run_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
        synonyms: ["run", "campaign run", "dispatch run"]
      recipient_id:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
        synonyms: ["recipient", "target", "contact"]
      lead_id:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
        nullable: true
        synonyms: ["prospect", "lead"]
        description: "dim_lead bridge — set only when the recipient is a CRM lead; NULL for dataset/event/webhook targets. INNER-join to dim_lead.lead_id for campaign→lead questions."
      capability:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["voice", "messaging", "webhook"]
        synonyms: ["channel type"]
      channel:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["voice", "whatsapp", "webhook"]
      provider:
        role: dimension
