      target_key:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
        synonyms: ["recording", "call id", "thread id", "case id"]
      target_type:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["chat_thread", "transcript", "test_case"]
      agent:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
      direction:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
      evaluator_name:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
        synonyms: ["evaluator", "reviewer", "grader", "check"]
      style:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["dimension", "rule", "comparison"]
      key:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
        synonyms: ["dimension", "criterion", "rule", "category"]
      label:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
      score:
        role: measure
        type: float
        data_type: quantitative
        semantic_type: score
        nullable: true
        measure_kind: score
      max:
        role: measure
        type: float
        data_type: quantitative
        semantic_type: score
        nullable: true
        measure_kind: score
      status:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
        allowed_values: ["PASS", "FAIL", "NA"]
        synonyms: ["verdict", "outcome"]
      severity:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
        allowed_values: ["minor", "moderate", "critical"]
      is_main:
        role: dimension
        type: boolean
        data_type: boolean
        nullable: true
        description: "True for the headline detail of the evaluation"
  fact_evaluation_review:
    pg_schema: analytics
    expected_empty_when: "no human reviews have been recorded for this app yet"
