        data_type: nominal
        semantic_type: category
        nullable: true
      reviewed_at:
        role: temporal
        type: timestamptz
        data_type: temporal
        nullable: true
      target_key:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
      key:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        synonyms: ["dimension", "attribute", "field"]
      decision:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
        allowed_values: ["accept", "correct", "reject"]
  evaluation_runs:
    orm: EvaluationRun
    pg_schema: platform
    layer: transactional
    grain: run
    columns:
      id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: pk
      tenant_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      user_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      app_id:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      eval_type:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      status:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      created_at:
        role: temporal
        type: timestamptz
        data_type: temporal
      started_at:
        role: temporal
        type: timestamptz
        data_type: temporal
        nullable: true
      completed_at:
        role: temporal
        type: timestamptz
        data_type: temporal
        nullable: true
      duration_ms:
        role: measure
        type: float
        data_type: quantitative
        semantic_type: duration
        unit: ms
        nullable: true
        measure_kind: duration_ms
      evaluator_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: fk
        nullable: true
