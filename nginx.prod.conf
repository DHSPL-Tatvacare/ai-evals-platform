server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Behind Azure Container Apps' TLS-terminating ingress, nginx sees Host =
    # internal app FQDN + scheme http. absolute_redirect on (default) would bake
    # those into Location and bounce users off the custom domain onto the raw
    # azure URL over http. Force relative redirects so the browser keeps its host.
    absolute_redirect off;

    # Proxy all API calls to the backend container (resolved via Docker network DNS)
    location /api/ {
        # Azure Container Apps: frontend and backend are separate apps, so we proxy
        # to the backend's HTTPS FQDN instead of a Docker network hostname.
        proxy_pass https://ai-evals-be-prod.nicerock-72127a04.centralindia.azurecontainerapps.io;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host ai-evals-be-prod.nicerock-72127a04.centralindia.azurecontainerapps.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        client_max_body_size 100M;
    }

    # Hashed build assets — filename changes every build, so cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Entry point — must never be cached, or new deploys won't be picked up
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Bare /docs → /docs/ so the docs SPA index resolves
    location = /docs {
        return 301 /docs/;
    }

    # Zudoku hashed assets — content-addressed, cache forever (mirror /assets/).
    location /docs/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Machine-readable markdown exports (per-page .md, llms consumers) — serve
    # inline as UTF-8 text instead of forcing a download (octet-stream default).
    location ~ ^/docs/.+\.md$ {
        default_type text/plain;
        charset utf-8;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Docs site (Zudoku, basePath /docs). Zudoku emits per-page files
    # (introduction.html, …) and expects clean URLs, so try $uri.html before the
    # SPA fallback — else /docs/introduction serves index.html (blank, hydration
    # mismatch) instead of introduction.html. HTML must revalidate so new deploys
    # are picked up (mirror = /index.html).
    location /docs/ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri.html $uri/ /docs/index.html;
    }

    # React SPA — any non-asset path falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
