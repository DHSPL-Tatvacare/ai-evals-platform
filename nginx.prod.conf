server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all API calls to the backend container (resolved via Docker network DNS)
    location /api/ {
        # Azure Container Apps: frontend and backend are separate apps, so we proxy
        # to the backend's HTTPS FQDN instead of a Docker network hostname.
        proxy_pass https://ai-evals-be-prod.nicerock-72127a04.centralindia.azurecontainerapps.io;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host ai-evals-be-prod.nicerock-72127a04.centralindia.azurecontainerapps.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        client_max_body_size 100M;
    }

    # Hashed build assets — filename changes every build, so cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Entry point — must never be cached, or new deploys won't be picked up
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Bare /docs → /docs/ so the docs SPA index resolves
    location = /docs {
        return 301 /docs/;
    }

    # Docs site (Zudoku, basePath /docs) — static files + SPA fallback to its own index
    location /docs/ {
        try_files $uri $uri/ /docs/index.html;
    }

    # React SPA — any non-asset path falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
